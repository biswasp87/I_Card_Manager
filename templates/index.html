<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card Manager Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>ID Card Manager Pro</h1>
            <p>Streamlined student data and photo management</p>
        </header>

        <div class="main-tabs" style="margin-bottom: 20px;">
            <button class="tab-btn active" onclick="showMainTab('configView')">Configuration & Capture</button>
            <button class="tab-btn" onclick="showMainTab('tableView')">Student Table View</button>
        </div>

        <main id="configView" class="grid-layout">
            <!-- Sidebar: Import and Config -->
            <aside class="sidebar">
                <section class="card">
                    <h2>1. Import Data</h2>
                    <div class="tabs">
                        <button class="tab-btn active" onclick="showTab('excelTab')">Excel</button>
                        <button class="tab-btn" onclick="showTab('dbTab')">PostgreSQL</button>
                    </div>

                    <div id="excelTab" class="tab-content">
                        <input type="file" id="excelFile" accept=".xlsx, .xls">
                        <button class="primary-btn" onclick="uploadExcel()">Upload Excel</button>
                    </div>

                    <div id="dbTab" class="tab-content" style="display:none;">
                        <input type="text" id="dbHost" placeholder="Host (localhost)">
                        <input type="text" id="dbName" placeholder="Database Name">
                        <input type="text" id="dbUser" placeholder="User">
                        <input type="password" id="dbPass" placeholder="Password">
                        <input type="text" id="dbTable" placeholder="Table Name">
                        <button class="primary-btn" onclick="fetchFromDB()">Connect & Fetch</button>
                    </div>
                </section>

                <section class="card">
                    <h2>2. Filename Configuration</h2>
                    <p class="hint">Select fields and assign sequence (e.g., 1, 2, 3)</p>
                    <div id="fieldCheckboxes" class="field-list">
                        <!-- Fields will be populated here -->
                    </div>
                </section>

                <section class="card">
                    <h2>3. Save Settings</h2>
                    <div class="input-group">
                        <label>Destination:</label>
                        <select id="destination" onchange="toggleDestination()">
                            <option value="local">Computer / Mobile</option>
                            <option value="google_drive">Google Drive</option>
                        </select>
                    </div>

                    <div id="localDest" class="input-group">
                        <label>Folder Path:</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="text" id="savePath" value="photos">
                            <button class="nav-btn" title="Browse Folder on Server" onclick="browseFolder()">📁</button>
                        </div>
                    </div>

                    <div id="driveDest" class="input-group" style="display:none;">
                        <button class="secondary-btn" onclick="authorizeDrive()">Login to Google Drive</button>
                        <input type="text" id="driveFolderId" placeholder="Folder ID (Optional)">
                    </div>

                    <div class="input-group">
                        <label>Save Filename to Column:</label>
                        <select id="updateColumn">
                            <option value="">(Don't Save to Source)</option>
                            <!-- Column names -->
                        </select>
                    </div>

                    <div class="input-group">
                        <label>File Format:</label>
                        <select id="imgFormat">
                            <option value="JPEG">JPEG</option>
                            <option value="PNG">PNG</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Quality:</label>
                        <select id="compression" onchange="toggleCompression()">
                            <option value="original">Original Quality</option>
                            <option value="compressed">Compressed</option>
                        </select>
                    </div>

                    <div id="compressionSettings" style="display:none;">
                        <div class="input-group">
                            <label>Quality (1-100):</label>
                            <input type="number" id="imgQuality" value="60" min="1" max="100">
                        </div>
                        <div class="input-group">
                            <label>Max Size (KB):</label>
                            <input type="number" id="targetSize" placeholder="Optional">
                        </div>
                    </div>
                </section>
            </aside>

            <!-- Main Content: Data and Camera -->
            <div class="content">
                <section class="card student-card">
                    <div class="student-header">
                        <h2>4. Student Data</h2>
                        <div class="nav-controls">
                            <label style="font-size: 0.8rem; margin-right: 5px;">
                                <input type="checkbox" id="imagePendingFilter" onchange="applyRecordFilter()"> Image Pending
                            </label>
                            <button class="nav-btn" onclick="prevRecord()">←</button>
                            <span id="recordStatus" class="badge">0 / 0</span>
                            <button class="nav-btn" onclick="nextRecord()">→</button>
                        </div>
                    </div>
                    <div id="studentDataDisplay" class="data-grid">
                        <!-- Data items -->
                    </div>
                </section>

                <section class="card camera-card">
                    <h2>5. Camera Preview</h2>
                    <div class="preview-wrapper">
                        <video id="video" autoplay playsinline></video>
                        <canvas id="canvas" style="display:none;"></canvas>
                    </div>
                    <div class="camera-controls">
                        <div class="dimension-inputs">
                            <label>W:</label> <input type="number" id="previewWidth" value="400" onchange="updatePreviewSize()">
                            <label>H:</label> <input type="number" id="previewHeight" value="400" onchange="updatePreviewSize()">
                        </div>
                        <button class="capture-btn" onclick="capturePhoto()">Capture & Save</button>
                    </div>
                </section>
            </div>
        </main>

        <main id="tableView" class="card" style="display:none;">
            <div class="table-controls" style="margin-bottom: 20px;">
                <h3>Table Configuration & Filters</h3>
                <div class="filter-row-container">
                    <!-- 4 Dropdown Rows -->
                    <div class="filter-row" id="filterRow1"></div>
                    <div class="filter-row" id="filterRow2"></div>
                    <div class="filter-row" id="filterRow3"></div>
                    <div class="filter-row" id="filterRow4"></div>
                </div>
                <button class="primary-btn" style="margin-top: 15px; width: auto;" onclick="generateTable()">Generate Table</button>
            </div>

            <div class="table-wrapper" style="overflow-x: auto;">
                <table id="studentTable">
                    <thead>
                        <tr id="tableHeader">
                            <th>Image</th>
                            <!-- Dynamic headers -->
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Student rows -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
